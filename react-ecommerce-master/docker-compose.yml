version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

  server:
    build: ./server
    env_file: ./server/.env
    ports:
      - 3000:3000
    depends_on:
      - db
    networks:
      - app-net

  client:
    build: ./client
    ports:
      - 80:80
    networks:
      - app-net

volumes:
  db-data:

networks:
  app-net:
    driver: bridge
