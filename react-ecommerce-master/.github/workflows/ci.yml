name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./
        run: |
          cd ${{ matrix.service }} || exit 0
          npm ci

      - name: Run lint
        working-directory: ./
        run: |
          cd ${{ matrix.service }} || exit 0
          if [ -f package.json ] && jq -e '.scripts.lint' package.json >/dev/null 2>&1; then npm run lint; else echo "No lint script"; fi

      - name: Run tests
        working-directory: ./
        run: |
          cd ${{ matrix.service }} || exit 0
          if [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then npm test --silent || true; else echo "No test script"; fi

  build-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/react-ecommerce-server:latest

      - name: Build and push client image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/react-ecommerce-client:latest
